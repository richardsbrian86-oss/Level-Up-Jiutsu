name: Azure CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install and build function app package
        working-directory: artifacts/api-server
        run: |
          npm install
          npm run build --if-present

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: fe3046d5-9ccc-49a0-9b90-6ca525c6c011
          tenant-id: 18c55be5-28dc-4f2e-bedc-be9b2d618d2b
          subscription-id: 2ef26035-a1ae-4373-b97f-1c28e0c78cbc

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: retentionpulse
          package: artifacts/api-server
          sku: flexconsumption